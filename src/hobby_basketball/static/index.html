<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hobby Basketball AI</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, "Microsoft YaHei", system-ui, sans-serif;
        background: #f5f7fb;
        color: #1f2933;
      }
      body {
        margin: 0;
      }
      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 20px;
        background: #111827;
        color: white;
      }
      main {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 16px;
        padding: 16px;
      }
      aside,
      section {
        background: white;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        padding: 16px;
      }
      label {
        display: block;
        font-weight: 650;
        font-size: 13px;
        margin-top: 12px;
      }
      input,
      select,
      textarea {
        box-sizing: border-box;
        width: 100%;
        margin-top: 6px;
        border: 1px solid #c7d0dd;
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
      }
      button {
        margin-top: 14px;
        width: 100%;
        border: 0;
        border-radius: 6px;
        padding: 10px 12px;
        background: #0f766e;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        background: #334155;
      }
      button:hover {
        filter: brightness(0.92);
      }
      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }
      .status {
        color: #6b7280;
        font-size: 13px;
      }
      .workspace {
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 14px;
      }
      .video-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      video {
        width: 100%;
        max-height: 420px;
        object-fit: contain;
        background: #0b1120;
        border-radius: 8px;
      }
      .video-wrap {
        position: relative;
      }
      .rim-overlay {
        display: none;
        position: absolute;
        border: 3px solid #ef4444;
        background: rgba(239, 68, 68, 0.08);
        pointer-events: none;
        box-sizing: border-box;
      }
      pre {
        background: #0b1120;
        color: #dbeafe;
        min-height: 210px;
        overflow: auto;
        border-radius: 8px;
        padding: 14px;
      }
      .hint {
        margin: 8px 0 0;
        color: #64748b;
        font-size: 13px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .candidate-list {
        display: grid;
        gap: 8px;
      }
      .candidate-item {
        display: grid;
        grid-template-columns: auto 72px 72px 1fr 68px;
        gap: 10px;
        align-items: center;
        border: 1px solid #d8dee8;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
      }
      .candidate-item input {
        margin: 0;
        width: auto;
      }
      .error {
        color: #b91c1c;
      }
      @media (max-width: 980px) {
        main,
        .video-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <strong>篮球 AI 剪辑工作台</strong>
        <span class="status" id="health">未连接</span>
      </header>
      <main>
        <aside>
          <label>选择篮球录像</label>
          <input id="videoFile" type="file" accept="video/*" />
          <button onclick="uploadVideo()">上传并生成预览</button>
          <p class="hint" id="uploadStatus">尚未选择视频。</p>

          <label>命中前秒数</label>
          <input id="preSeconds" type="number" step="0.1" min="0" value="5.0" />
          <label>命中后秒数</label>
          <input id="postSeconds" type="number" step="0.1" min="0.1" value="1.5" />

          <div class="row">
            <div>
              <label>篮筐中心 X</label>
              <input id="rimX" type="number" value="100" />
            </div>
            <div>
              <label>篮筐中心 Y</label>
              <input id="rimY" type="number" value="100" />
            </div>
          </div>
          <p class="hint">上传后暂停在篮筐清晰的画面，点击左侧视频即可自动填入中心坐标。</p>

          <div class="row">
            <div>
              <label>篮筐半宽</label>
              <input id="rimHalfWidth" type="number" value="42" min="1" />
            </div>
            <div>
              <label>篮筐半高</label>
              <input id="rimHalfHeight" type="number" value="50" min="1" />
            </div>
          </div>

          <label>识别置信度</label>
          <input id="confidence" type="number" step="0.01" min="0" max="1" value="0.15" />
          <label>抽样 FPS</label>
          <input id="sampleFps" type="number" step="0.5" min="1" max="15" value="12.0" />
          <p class="hint">快速颜色/运动模式默认 12 FPS；长视频或低配机器可适当降低。</p>
          <label>识别设备</label>
          <select id="device">
            <option value="cpu" selected>CPU（兼容优先）</option>
            <option value="auto">Auto（可能使用 CUDA）</option>
            <option value="cuda">CUDA（显卡/驱动/PyTorch 匹配时）</option>
          </select>
          <p class="hint">默认 CPU 可避开 CUDA 显卡兼容问题；CUDA 更快，但只建议在环境匹配时使用。</p>
          <p class="hint" id="deviceStatus">正在检测 CUDA 兼容性...</p>
          <label>导出格式</label>
          <select id="outputFormat">
            <option value="mp4">MP4</option>
            <option value="mov">MOV</option>
          </select>
          <button id="detectBtn" onclick="detectCandidates()" disabled>识别候选</button>
          <button id="exportSelectedBtn" class="secondary" onclick="exportSelectedCandidates()" disabled>导出已选候选</button>
          <button id="reviewSheetBtn" class="secondary" onclick="generateReviewSheet()" disabled>生成候选审查图</button>
          <label>人工标注进球时间</label>
          <textarea id="truthTimes" rows="3" placeholder="例如：18.4, 44.7, 51.2"></textarea>
          <button id="markTruthBtn" class="secondary" onclick="markCurrentTruthTime()" disabled>添加当前时间为标注</button>
          <button id="evaluateBtn" class="secondary" onclick="evaluateCandidates()" disabled>评估候选准确率</button>
          <button id="saveEvaluationBtn" class="secondary" onclick="saveEvaluationRun()" disabled>保存评估报告</button>
          <button id="processBtn" onclick="processVideo()" disabled>执行识别并剪辑</button>
        </aside>

        <section class="workspace">
          <div>
            <h2>视频预览与导出</h2>
            <p class="status">流程：选择文件 -> 上传预览 -> 点击篮筐中心 -> 执行 YOLO 识别 -> FFmpeg 生成集锦。</p>
          </div>
          <div class="video-grid">
            <div>
              <h3>原始视频</h3>
              <div class="video-wrap">
                <video
                  id="sourcePreview"
                  controls
                  onclick="pickRimCenter(event)"
                  onmousedown="startRimDrag(event)"
                  onmousemove="updateRimDrag(event)"
                  onmouseup="finishRimDrag(event)"
                  onmouseleave="finishRimDrag(event)"
                ></video>
                <div id="rimOverlay" class="rim-overlay"></div>
              </div>
            </div>
            <div>
              <h3>导出预览</h3>
              <video id="exportPreview" controls></video>
            </div>
          </div>
          <div>
            <h3>候选进球复核</h3>
            <div id="candidateList" class="candidate-list">
              <p class="hint">识别候选后，可取消勾选误报，再导出已选片段。</p>
            </div>
          </div>
          <div>
            <h3>执行结果</h3>
            <pre id="output">等待上传视频...</pre>
          </div>
        </section>
      </main>
    </div>
    <script>
      let currentVideoId = null;
      let currentEvents = [];
      let currentEvaluationReport = null;
      let rimDragStart = null;
      let suppressNextRimClickUntil = 0;
      const MIN_RIM_HALF_WIDTH = 42;
      const MIN_RIM_HALF_HEIGHT = 50;

      function setOutput(value, isError = false) {
        const output = document.getElementById("output");
        output.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
        output.className = isError ? "error" : "";
      }

      async function refreshHealth() {
        const response = await fetch("/api/health");
        const data = await response.json();
        document.getElementById("health").textContent = data.status === "ok" ? "后端已连接" : "后端异常";
      }

      async function refreshDeviceStatus() {
        const response = await fetch("/api/device-status");
        const data = await response.json();
        const status = document.getElementById("deviceStatus");
        const device = document.getElementById("device");
        status.textContent = data.message || "设备状态未知，默认使用 CPU。";
        if (data.default_device === "cpu") {
          device.value = "cpu";
        }
        for (const option of device.options) {
          if (["cuda", "auto"].includes(option.value)) {
            option.disabled = data.cuda_available && data.cuda_supported ? false : true;
          }
        }
      }

      async function uploadVideo() {
        const fileInput = document.getElementById("videoFile");
        const file = fileInput.files[0];
        if (!file) {
          setOutput("请先选择一个视频文件。", true);
          return;
        }
        const formData = new FormData();
        formData.append("file", file);
        document.getElementById("uploadStatus").textContent = "上传中...";
        try {
          const response = await fetch("/api/upload-video", { method: "POST", body: formData });
          const data = await response.json();
          if (!response.ok) {
            setOutput(data.detail || "上传失败", true);
            document.getElementById("uploadStatus").textContent = "上传失败";
            return;
          }
          currentVideoId = data.video_id;
          currentEvents = [];
          currentEvaluationReport = null;
          document.getElementById("sourcePreview").src = data.preview_url;
          document.getElementById("processBtn").disabled = false;
          document.getElementById("detectBtn").disabled = false;
          document.getElementById("exportSelectedBtn").disabled = true;
          document.getElementById("reviewSheetBtn").disabled = true;
          document.getElementById("evaluateBtn").disabled = true;
          document.getElementById("saveEvaluationBtn").disabled = true;
          document.getElementById("markTruthBtn").disabled = false;
          renderCandidateList([]);
          document.getElementById("uploadStatus").textContent = `已上传：${data.filename}`;
          setOutput(data);
        } catch (error) {
          setOutput(`上传失败：${error}`, true);
          document.getElementById("uploadStatus").textContent = "上传失败";
        }
      }

      function pickRimCenter(event) {
        const video = event.currentTarget;
        if (!video.videoWidth || !video.videoHeight) {
          return;
        }
        if (event.detail === 0) {
          return;
        }
        if (Date.now() < suppressNextRimClickUntil) {
          return;
        }
        const point = videoPoint(event);
        if (!point) {
          return;
        }
        const {x, y} = point.video;
        document.getElementById("rimX").value = Math.round(x);
        document.getElementById("rimY").value = Math.round(y);
        ensureUsableRimBox();
        drawRimOverlayFromInputs();
      }

      function startRimDrag(event) {
        const point = videoPoint(event);
        if (!point) {
          return;
        }
        rimDragStart = point;
        updateRimOverlay(point.client, point.client);
      }

      function updateRimDrag(event) {
        if (!rimDragStart) {
          return;
        }
        const point = videoPoint(event);
        if (!point) {
          return;
        }
        updateRimOverlay(rimDragStart.client, point.client);
      }

      function finishRimDrag(event) {
        if (!rimDragStart) {
          return;
        }
        const point = videoPoint(event);
        if (!point) {
          rimDragStart = null;
          return;
        }
        const start = rimDragStart.video;
        const end = point.video;
        const halfWidth = Math.max(4, Math.abs(end.x - start.x) / 2);
        const halfHeight = Math.max(4, Math.abs(end.y - start.y) / 2);
        if (halfWidth > 6 && halfHeight > 6) {
          document.getElementById("rimX").value = Math.round((start.x + end.x) / 2);
          document.getElementById("rimY").value = Math.round((start.y + end.y) / 2);
          document.getElementById("rimHalfWidth").value = Math.round(halfWidth);
          document.getElementById("rimHalfHeight").value = Math.round(halfHeight);
          ensureUsableRimBox();
          drawRimOverlayFromInputs();
          suppressNextRimClickUntil = Date.now() + 250;
        }
        rimDragStart = null;
      }

      function ensureUsableRimBox() {
        const halfWidthInput = document.getElementById("rimHalfWidth");
        const halfHeightInput = document.getElementById("rimHalfHeight");
        const halfWidth = Number(halfWidthInput.value);
        const halfHeight = Number(halfHeightInput.value);
        if (!Number.isFinite(halfWidth) || halfWidth < MIN_RIM_HALF_WIDTH) {
          halfWidthInput.value = MIN_RIM_HALF_WIDTH;
        }
        if (
          !Number.isFinite(halfHeight) ||
          halfHeight < MIN_RIM_HALF_HEIGHT ||
          halfHeight < Number(halfWidthInput.value) * 0.8
        ) {
          halfHeightInput.value = MIN_RIM_HALF_HEIGHT;
        }
      }

      function videoPoint(event) {
        const video = document.getElementById("sourcePreview");
        if (!video.videoWidth || !video.videoHeight) {
          return null;
        }
        const elementRect = video.getBoundingClientRect();
        const contentRect = displayedVideoRect(video);
        const clientX = Math.min(Math.max(event.clientX, contentRect.left), contentRect.right);
        const clientY = Math.min(Math.max(event.clientY, contentRect.top), contentRect.bottom);
        return {
          client: {x: clientX - elementRect.left, y: clientY - elementRect.top},
          video: {
            x: (clientX - contentRect.left) * (video.videoWidth / contentRect.width),
            y: (clientY - contentRect.top) * (video.videoHeight / contentRect.height)
          }
        };
      }

      function displayedVideoRect(video) {
        const rect = video.getBoundingClientRect();
        const videoAspect = video.videoWidth / video.videoHeight;
        const elementAspect = rect.width / rect.height;
        if (elementAspect > videoAspect) {
          const width = rect.height * videoAspect;
          const left = rect.left + (rect.width - width) / 2;
          return {left, top: rect.top, width, height: rect.height, right: left + width, bottom: rect.bottom};
        }
        const height = rect.width / videoAspect;
        const top = rect.top + (rect.height - height) / 2;
        return {left: rect.left, top, width: rect.width, height, right: rect.right, bottom: top + height};
      }

      function updateRimOverlay(a, b) {
        const overlay = document.getElementById("rimOverlay");
        const left = Math.min(a.x, b.x);
        const top = Math.min(a.y, b.y);
        overlay.style.display = "block";
        overlay.style.left = `${left}px`;
        overlay.style.top = `${top}px`;
        overlay.style.width = `${Math.abs(b.x - a.x)}px`;
        overlay.style.height = `${Math.abs(b.y - a.y)}px`;
      }

      function drawRimOverlayFromInputs() {
        const video = document.getElementById("sourcePreview");
        if (!video.videoWidth || !video.videoHeight) {
          return;
        }
        const elementRect = video.getBoundingClientRect();
        const contentRect = displayedVideoRect(video);
        const offsetX = contentRect.left - elementRect.left;
        const offsetY = contentRect.top - elementRect.top;
        const scaleX = contentRect.width / video.videoWidth;
        const scaleY = contentRect.height / video.videoHeight;
        const cx = offsetX + Number(document.getElementById("rimX").value) * scaleX;
        const cy = offsetY + Number(document.getElementById("rimY").value) * scaleY;
        const hw = Number(document.getElementById("rimHalfWidth").value) * scaleX;
        const hh = Number(document.getElementById("rimHalfHeight").value) * scaleY;
        updateRimOverlay({x: cx - hw, y: cy - hh}, {x: cx + hw, y: cy + hh});
      }

      function buildProcessPayload() {
        return {
          video_id: currentVideoId,
          pre_seconds: Number(document.getElementById("preSeconds").value),
          post_seconds: Number(document.getElementById("postSeconds").value),
          output_format: document.getElementById("outputFormat").value,
          confidence: Number(document.getElementById("confidence").value),
          sample_fps: Number(document.getElementById("sampleFps").value),
          device: document.getElementById("device").value,
          rim: {
            center_x: Number(document.getElementById("rimX").value),
            center_y: Number(document.getElementById("rimY").value),
            half_width: Number(document.getElementById("rimHalfWidth").value),
            half_height: Number(document.getElementById("rimHalfHeight").value)
          }
        };
      }

      async function detectCandidates() {
        if (!currentVideoId) {
          setOutput("请先上传视频。", true);
          return;
        }
        const button = document.getElementById("detectBtn");
        button.disabled = true;
        button.textContent = "识别候选中...";
        setOutput("正在识别候选进球，请稍等。");
        try {
          const response = await fetch("/api/detect-video", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(buildProcessPayload())
          });
          const data = await response.json();
          if (!response.ok) {
            setOutput(data.detail || "识别候选失败", true);
            return;
          }
          currentEvents = data.events.map((event) => ({...event, kept: event.kept !== false}));
          currentEvaluationReport = null;
          renderCandidateList(currentEvents);
          document.getElementById("exportSelectedBtn").disabled = currentEvents.length === 0;
          document.getElementById("reviewSheetBtn").disabled = currentEvents.length === 0;
          document.getElementById("evaluateBtn").disabled = currentEvents.length === 0;
          document.getElementById("saveEvaluationBtn").disabled = true;
          setOutput(data);
        } catch (error) {
          setOutput(`识别候选失败：${error}`, true);
        } finally {
          button.disabled = false;
          button.textContent = "识别候选";
        }
      }

      function renderCandidateList(events) {
        const list = document.getElementById("candidateList");
        if (!events.length) {
          list.innerHTML = '<p class="hint">识别候选后，可取消勾选误报，再导出已选片段。</p>';
          return;
        }
        list.innerHTML = "";
        for (const event of events) {
          const item = document.createElement("label");
          item.className = "candidate-item";
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = event.kept !== false;
          checkbox.onchange = () => {
            event.kept = checkbox.checked;
          };
          const time = document.createElement("span");
          time.textContent = `${Number(event.t_make).toFixed(2)}s`;
          const confidence = document.createElement("span");
          confidence.textContent = `${Math.round(Number(event.confidence) * 100)}%`;
          const notes = document.createElement("span");
          notes.textContent = event.notes || event.id;
          const seek = document.createElement("button");
          seek.type = "button";
          seek.className = "secondary";
          seek.textContent = "跳转";
          seek.onclick = (clickEvent) => {
            clickEvent.preventDefault();
            seekCandidate(event.t_make);
          };
          item.append(checkbox, time, confidence, notes, seek);
          list.appendChild(item);
        }
      }

      function seekCandidate(timeSeconds) {
        const video = document.getElementById("sourcePreview");
        if (!video.src) {
          return;
        }
        video.currentTime = Math.max(0, Number(timeSeconds) - 1.0);
        video.pause();
      }

      function markCurrentTruthTime() {
        const video = document.getElementById("sourcePreview");
        if (!video.src || !Number.isFinite(video.currentTime)) {
          setOutput("请先在原始视频里定位一个进球时间。", true);
          return;
        }
        addTruthTime(video.currentTime);
      }

      function addTruthTime(timeSeconds) {
        const textarea = document.getElementById("truthTimes");
        const existing = parseTruthTimes();
        const value = Number(timeSeconds);
        if (!Number.isFinite(value) || value < 0) {
          return;
        }
        existing.push(Number(value.toFixed(2)));
        const unique = [...new Set(existing)].sort((a, b) => a - b);
        textarea.value = unique.map((item) => item.toFixed(2)).join(", ");
      }

      function selectedEvents() {
        return currentEvents.filter((event) => event.kept !== false);
      }

      async function exportSelectedCandidates() {
        const events = selectedEvents();
        if (!events.length) {
          setOutput("请至少保留一个候选片段。", true);
          return;
        }
        const button = document.getElementById("exportSelectedBtn");
        button.disabled = true;
        button.textContent = "导出中...";
        try {
          const response = await fetch("/api/export-events", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
              video_id: currentVideoId,
              events,
              pre_seconds: Number(document.getElementById("preSeconds").value),
              post_seconds: Number(document.getElementById("postSeconds").value),
              output_format: document.getElementById("outputFormat").value
            })
          });
          const data = await response.json();
          if (!response.ok) {
            setOutput(data.detail || "导出失败", true);
            return;
          }
          document.getElementById("exportPreview").src = data.preview_url;
          setOutput(data);
        } catch (error) {
          setOutput(`导出失败：${error}`, true);
        } finally {
          button.disabled = false;
          button.textContent = "导出已选候选";
        }
      }

      async function generateReviewSheet() {
        if (!currentVideoId || !currentEvents.length) {
          setOutput("请先识别候选事件。", true);
          return;
        }
        const button = document.getElementById("reviewSheetBtn");
        button.disabled = true;
        button.textContent = "生成中...";
        try {
          const response = await fetch("/api/candidate-review-sheet", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
              video_id: currentVideoId,
              events: currentEvents,
              rim: {
                center_x: Number(document.getElementById("rimX").value),
                center_y: Number(document.getElementById("rimY").value),
                half_width: Number(document.getElementById("rimHalfWidth").value),
                half_height: Number(document.getElementById("rimHalfHeight").value)
              }
            })
          });
          const data = await response.json();
          if (response.ok && data.preview_url) {
            window.open(data.preview_url, "_blank");
          }
          setOutput(data, !response.ok);
        } catch (error) {
          setOutput(`生成候选审查图失败：${error}`, true);
        } finally {
          button.disabled = currentEvents.length === 0;
          button.textContent = "生成候选审查图";
        }
      }

      function parseTruthTimes() {
        return document.getElementById("truthTimes").value
          .split(/[,\n\s]+/)
          .map((value) => Number(value.trim()))
          .filter((value) => Number.isFinite(value) && value >= 0);
      }

      async function evaluateCandidates() {
        const truthTimes = parseTruthTimes();
        if (!truthTimes.length) {
          setOutput("请先输入人工标注的进球时间。", true);
          return;
        }
        const events = selectedEvents();
        if (!events.length) {
          setOutput("请至少保留一个候选事件再评估。", true);
          return;
        }
        const response = await fetch("/api/evaluate-candidates", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            events,
            truth_times: truthTimes,
            tolerance_sec: 1.0,
            target_precision: 0.95,
            target_recall: 0.95
          })
        });
        const data = await response.json();
        if (response.ok) {
          currentEvaluationReport = data;
          applyRecommendedThreshold(data);
          document.getElementById("saveEvaluationBtn").disabled = false;
        }
        setOutput(data, !response.ok);
      }

      function applyRecommendedThreshold(report) {
        const threshold = Number(report && report.recommended_threshold);
        if (!Number.isFinite(threshold)) {
          return;
        }
        document.getElementById("confidence").value = threshold.toFixed(6);
        currentEvents = currentEvents.map((event) => ({
          ...event,
          kept: event.kept !== false && Number(event.confidence) >= threshold
        }));
        renderCandidateList(currentEvents);
        document.getElementById("exportSelectedBtn").disabled = selectedEvents().length === 0;
      }

      async function saveEvaluationRun() {
        const truthTimes = parseTruthTimes();
        if (!currentEvaluationReport || !truthTimes.length || !currentVideoId) {
          setOutput("请先完成候选评估再保存报告。", true);
          return;
        }
        const response = await fetch("/api/save-evaluation-run", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            video_id: currentVideoId,
            events: currentEvents,
            truth_times: truthTimes,
            tolerance_sec: 1.0,
            target_precision: 0.95,
            target_recall: 0.95,
            rim: {
              center_x: Number(document.getElementById("rimX").value),
              center_y: Number(document.getElementById("rimY").value),
              half_width: Number(document.getElementById("rimHalfWidth").value),
              half_height: Number(document.getElementById("rimHalfHeight").value)
            },
            sample_fps: Number(document.getElementById("sampleFps").value),
            confidence: Number(document.getElementById("confidence").value),
            device: document.getElementById("device").value,
            model_name: "none"
          })
        });
        const data = await response.json();
        setOutput(data, !response.ok);
      }

      async function processVideo() {
        if (!currentVideoId) {
          setOutput("请先上传视频。", true);
          return;
        }
        const payload = {
          video_id: currentVideoId,
          pre_seconds: Number(document.getElementById("preSeconds").value),
          post_seconds: Number(document.getElementById("postSeconds").value),
          output_format: document.getElementById("outputFormat").value,
          confidence: Number(document.getElementById("confidence").value),
          sample_fps: Number(document.getElementById("sampleFps").value),
          device: document.getElementById("device").value,
          rim: {
            center_x: Number(document.getElementById("rimX").value),
            center_y: Number(document.getElementById("rimY").value),
            half_width: Number(document.getElementById("rimHalfWidth").value),
            half_height: Number(document.getElementById("rimHalfHeight").value)
          }
        };
        const button = document.getElementById("processBtn");
        button.disabled = true;
        button.textContent = "识别与剪辑中...";
        setOutput("正在识别进球并导出视频，这可能需要几分钟。");
        try {
          const response = await fetch("/api/process-video", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
          });
          const data = await response.json();
          if (!response.ok) {
            setOutput(data.detail || "处理失败", true);
            return;
          }
          document.getElementById("exportPreview").src = data.preview_url;
          setOutput(data);
        } catch (error) {
          setOutput(`处理失败：${error}`, true);
        } finally {
          button.disabled = false;
          button.textContent = "执行识别并剪辑";
        }
      }

      refreshHealth().catch(() => {
        document.getElementById("health").textContent = "后端未连接";
      });
      refreshDeviceStatus().catch(() => {
        document.getElementById("deviceStatus").textContent = "无法检测 CUDA 状态，默认使用 CPU。";
      });
    </script>
  </body>
</html>
